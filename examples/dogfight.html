<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dogfight — prompt-to-tripo-game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    color: #0ff; font: bold 16px/1.4 monospace; text-align: center;
    text-shadow: 0 0 8px #0ff; pointer-events: none;
  }
  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 32px; height: 32px; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(0,255,255,0.8);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; }
  #crosshair::after  { width: 100%; height: 2px; top: 50%; left: 0; }
  #controls {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font: 12px monospace; text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="hud">
  <div id="score">SCORE: 0</div>
  <div id="hp">HP: ████████████████████ 100%</div>
  <div id="ammo">MISSILES: 20</div>
  <div id="wave">WAVE 1</div>
</div>
<div id="crosshair"></div>
<div id="controls">WASD / Arrow Keys — Move &nbsp;|&nbsp; SPACE — Fire Missile &nbsp;|&nbsp; Q/E — Roll</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
// ─── Scene setup ────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1628);
scene.fog = new THREE.Fog(0x0a1628, 200, 800);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 1000);

// ─── Lighting ────────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff4e0, 2.5);
sun.position.set(100, 200, 50);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 600;
sun.shadow.camera.left = -200;
sun.shadow.camera.right = 200;
sun.shadow.camera.top = 200;
sun.shadow.camera.bottom = -200;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x334466, 1.2));
const rimLight = new THREE.DirectionalLight(0x4488ff, 0.8);
rimLight.position.set(-50, 30, -100);
scene.add(rimLight);

// ─── Sky / clouds ────────────────────────────────────────────────────────────
function makeCloud(x, y, z) {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0xddeeff, roughness: 1, metalness: 0 });
  [[0,0,0,3,1.5,3],[2.5,0.5,0,2,1.2,2],[-2,0.3,0,2.2,1.3,2],[0,0,2,2,1,2],[0,0,-2,2,1,2]].forEach(([cx,cy,cz,w,h,d]) => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(1, 7, 5), mat);
    m.scale.set(w, h, d);
    m.position.set(cx, cy, cz);
    g.add(m);
  });
  g.position.set(x, y, z);
  scene.add(g);
  return g;
}
const clouds = [];
for (let i = 0; i < 30; i++) {
  clouds.push(makeCloud(
    (Math.random() - 0.5) * 600,
    60 + Math.random() * 80,
    (Math.random() - 0.5) * 600
  ));
}

// ─── Ground ──────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1200, 1200, 40, 40),
  new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.9, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Player jet ──────────────────────────────────────────────────────────────
const playerJet = new THREE.Group();
scene.add(playerJet);
playerJet.position.set(0, 80, 0);

// Fuselage
const fuselage = new THREE.Mesh(
  new THREE.CylinderGeometry(0.4, 0.8, 8, 8),
  new THREE.MeshStandardMaterial({ color: 0x1a2a4a, roughness: 0.3, metalness: 0.8 })
);
fuselage.rotation.x = Math.PI / 2;
fuselage.castShadow = true;
playerJet.add(fuselage);
window.fuselage = fuselage;

// Cockpit
const cockpit = new THREE.Mesh(
  new THREE.SphereGeometry(0.55, 8, 6),
  new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, metalness: 0.9, transparent: true, opacity: 0.7 })
);
cockpit.position.set(0, 0.5, -2.2);
cockpit.scale.set(1, 0.7, 1.2);
cockpit.castShadow = true;
playerJet.add(cockpit);
window.cockpit = cockpit;

// Main wings
const mainWing = new THREE.Mesh(
  new THREE.BoxGeometry(10, 0.15, 3),
  new THREE.MeshStandardMaterial({ color: 0x1a2a4a, roughness: 0.3, metalness: 0.8 })
);
mainWing.position.set(0, 0, 0.5);
mainWing.castShadow = true;
playerJet.add(mainWing);
window.mainWing = mainWing;

// Tail fins
const tailFin = new THREE.Mesh(
  new THREE.BoxGeometry(3.5, 0.12, 1.5),
  new THREE.MeshStandardMaterial({ color: 0x1a2a4a, roughness: 0.3, metalness: 0.8 })
);
tailFin.position.set(0, 0, 3.2);
tailFin.castShadow = true;
playerJet.add(tailFin);
window.tailFin = tailFin;

// Vertical stabilizer
const vertStab = new THREE.Mesh(
  new THREE.BoxGeometry(0.15, 2, 1.8),
  new THREE.MeshStandardMaterial({ color: 0x1a2a4a, roughness: 0.3, metalness: 0.8 })
);
vertStab.position.set(0, 1, 3);
vertStab.castShadow = true;
playerJet.add(vertStab);
window.vertStab = vertStab;

// Engine nozzles
[-0.8, 0.8].forEach(ox => {
  const nozzle = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.25, 1.2, 8),
    new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2, metalness: 1 })
  );
  nozzle.rotation.x = Math.PI / 2;
  nozzle.position.set(ox, -0.1, 4.2);
  playerJet.add(nozzle);
});

// Engine glow
const engineGlow = new THREE.PointLight(0xff6600, 3, 8);
engineGlow.position.set(0, 0, 5);
playerJet.add(engineGlow);

// ─── Enemy jets ──────────────────────────────────────────────────────────────
function makeEnemyJet(x, y, z) {
  const g = new THREE.Group();
  scene.add(g);
  g.position.set(x, y, z);

  const enemyFuselage = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.7, 7, 8),
    new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 0.3, metalness: 0.7 })
  );
  enemyFuselage.rotation.x = Math.PI / 2;
  enemyFuselage.castShadow = true;
  g.add(enemyFuselage);
  window.enemyFuselage = enemyFuselage;

  const enemyWing = new THREE.Mesh(
    new THREE.BoxGeometry(8, 0.12, 2.5),
    new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 0.3, metalness: 0.7 })
  );
  enemyWing.position.set(0, 0, 0.5);
  enemyWing.castShadow = true;
  g.add(enemyWing);
  window.enemyWing = enemyWing;

  const enemyCockpit = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 8, 6),
    new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.1, metalness: 0.8, transparent: true, opacity: 0.6 })
  );
  enemyCockpit.position.set(0, 0.4, -2);
  enemyCockpit.scale.set(1, 0.65, 1.1);
  g.add(enemyCockpit);
  window.enemyCockpit = enemyCockpit;

  g.userData = {
    hp: 3,
    vel: new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      (Math.random() - 0.5) * 0.1,
      (Math.random() - 0.5) * 0.3
    ),
    timer: Math.random() * Math.PI * 2,
    fireTimer: 2 + Math.random() * 3,
  };
  return g;
}

const enemies = [];
function spawnWave(count) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const r = 150 + Math.random() * 80;
    enemies.push(makeEnemyJet(
      Math.cos(angle) * r,
      60 + Math.random() * 60,
      Math.sin(angle) * r
    ));
  }
}
spawnWave(4);

// ─── Missiles ────────────────────────────────────────────────────────────────
const playerMissiles = [];
const enemyMissiles = [];

function makeMissile(isPlayer) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 1.2, 6),
    new THREE.MeshStandardMaterial({ color: isPlayer ? 0x00ffff : 0xff4400, roughness: 0.2, metalness: 0.9 })
  );
  body.rotation.x = Math.PI / 2;
  g.add(body);
  const tip = new THREE.Mesh(
    new THREE.ConeGeometry(0.08, 0.4, 6),
    new THREE.MeshStandardMaterial({ color: isPlayer ? 0xffffff : 0xff8800, roughness: 0.1, metalness: 1 })
  );
  tip.rotation.x = Math.PI / 2;
  tip.position.z = -0.8;
  g.add(tip);
  const glow = new THREE.PointLight(isPlayer ? 0x00ffff : 0xff4400, 2, 5);
  glow.position.z = 0.6;
  g.add(glow);
  scene.add(g);
  return g;
}

// ─── Explosion particles ─────────────────────────────────────────────────────
const explosions = [];
function spawnExplosion(pos) {
  const particles = [];
  for (let i = 0; i < 20; i++) {
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.15 + Math.random() * 0.3, 4, 4),
      new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.05 + Math.random() * 0.1, 1, 0.5 + Math.random() * 0.3), emissive: new THREE.Color(0xff4400), emissiveIntensity: 2 })
    );
    p.position.copy(pos);
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.8,
      (Math.random() - 0.5) * 0.8,
      (Math.random() - 0.5) * 0.8
    );
    p.userData.life = 1;
    scene.add(p);
    particles.push(p);
  }
  explosions.push({ particles, life: 1 });
}

// ─── Game state ──────────────────────────────────────────────────────────────
let score = 0;
let hp = 100;
let ammo = 20;
let wave = 1;
let gameOver = false;
let fireCooldown = 0;

const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// Jet physics
const jetVel = new THREE.Vector3();
const jetRot = new THREE.Euler(0, 0, 0, 'YXZ');
let rollAngle = 0;

// ─── HUD update ──────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = `SCORE: ${score}`;
  const bars = Math.max(0, Math.round(hp / 5));
  document.getElementById('hp').textContent = `HP: ${'█'.repeat(bars)}${'░'.repeat(20 - bars)} ${hp}%`;
  document.getElementById('ammo').textContent = `MISSILES: ${ammo}`;
  document.getElementById('wave').textContent = `WAVE ${wave}`;
}

// ─── Main loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  if (gameOver) return;

  const dt = Math.min(clock.getDelta(), 0.05);
  fireCooldown = Math.max(0, fireCooldown - dt);

  // ── Player controls ──
  const speed = 40;
  const turnSpeed = 1.2;

  if (keys['KeyW'] || keys['ArrowUp'])    jetRot.x = Math.max(jetRot.x - turnSpeed * dt, -0.8);
  if (keys['KeyS'] || keys['ArrowDown'])  jetRot.x = Math.min(jetRot.x + turnSpeed * dt,  0.8);
  if (keys['KeyA'] || keys['ArrowLeft'])  jetRot.y += turnSpeed * dt;
  if (keys['KeyD'] || keys['ArrowRight']) jetRot.y -= turnSpeed * dt;
  if (keys['KeyQ']) rollAngle -= 2 * dt;
  if (keys['KeyE']) rollAngle += 2 * dt;
  rollAngle *= 0.92;

  // Dampen pitch
  jetRot.x *= 0.95;

  // Forward thrust
  const forward = new THREE.Vector3(0, 0, -1).applyEuler(jetRot);
  jetVel.addScaledVector(forward, speed * dt);
  jetVel.multiplyScalar(0.92);

  playerJet.position.addScaledVector(jetVel, dt);
  playerJet.position.y = Math.max(5, Math.min(250, playerJet.position.y));
  playerJet.rotation.copy(jetRot);
  playerJet.rotation.z = rollAngle - jetRot.y * 0.3;

  // Engine glow pulse
  engineGlow.intensity = 2.5 + Math.sin(Date.now() * 0.02) * 0.5;

  // ── Fire missile ──
  if (keys['Space'] && fireCooldown <= 0 && ammo > 0) {
    fireCooldown = 0.35;
    ammo--;
    const m = makeMissile(true);
    m.position.copy(playerJet.position);
    m.rotation.copy(playerJet.rotation);
    const dir = new THREE.Vector3(0, 0, -1).applyEuler(playerJet.rotation);
    m.userData = { vel: dir.multiplyScalar(120), life: 3, isPlayer: true };
    playerMissiles.push(m);
    updateHUD();
  }

  // ── Update player missiles ──
  for (let i = playerMissiles.length - 1; i >= 0; i--) {
    const m = playerMissiles[i];
    m.userData.life -= dt;
    m.position.addScaledVector(m.userData.vel, dt);
    if (m.userData.life <= 0) {
      scene.remove(m);
      playerMissiles.splice(i, 1);
      continue;
    }
    // Hit enemy?
    for (let j = enemies.length - 1; j >= 0; j--) {
      if (m.position.distanceTo(enemies[j].position) < 5) {
        enemies[j].userData.hp--;
        spawnExplosion(m.position.clone());
        scene.remove(m);
        playerMissiles.splice(i, 1);
        if (enemies[j].userData.hp <= 0) {
          spawnExplosion(enemies[j].position.clone());
          scene.remove(enemies[j]);
          enemies.splice(j, 1);
          score += 100;
          updateHUD();
        }
        break;
      }
    }
  }

  // ── Update enemies ──
  enemies.forEach(e => {
    e.userData.timer += dt;
    const t = e.userData.timer;

    // Circle + chase player
    const toPlayer = playerJet.position.clone().sub(e.position);
    const dist = toPlayer.length();
    const chaseDir = toPlayer.normalize();
    const circleDir = new THREE.Vector3(-chaseDir.z, 0, chaseDir.x).normalize();
    const desired = chaseDir.multiplyScalar(0.6).add(circleDir.multiplyScalar(0.4));
    e.userData.vel.lerp(desired.multiplyScalar(25), 0.03);
    e.position.addScaledVector(e.userData.vel, dt);
    e.position.y += Math.sin(t * 0.5) * 0.1;
    e.position.y = Math.max(20, Math.min(200, e.position.y));
    e.lookAt(playerJet.position);

    // Enemy fires
    e.userData.fireTimer -= dt;
    if (e.userData.fireTimer <= 0 && dist < 120) {
      e.userData.fireTimer = 2.5 + Math.random() * 2;
      const em = makeMissile(false);
      em.position.copy(e.position);
      const dir = playerJet.position.clone().sub(e.position).normalize();
      em.userData = { vel: dir.multiplyScalar(70), life: 4, isPlayer: false };
      enemyMissiles.push(em);
    }
  });

  // ── Update enemy missiles ──
  for (let i = enemyMissiles.length - 1; i >= 0; i--) {
    const m = enemyMissiles[i];
    m.userData.life -= dt;
    m.position.addScaledVector(m.userData.vel, dt);
    if (m.userData.life <= 0) {
      scene.remove(m);
      enemyMissiles.splice(i, 1);
      continue;
    }
    if (m.position.distanceTo(playerJet.position) < 4) {
      hp = Math.max(0, hp - 20);
      spawnExplosion(m.position.clone());
      scene.remove(m);
      enemyMissiles.splice(i, 1);
      updateHUD();
      if (hp <= 0) {
        spawnExplosion(playerJet.position.clone());
        gameOver = true;
        document.getElementById('hud').innerHTML = `<div style="font-size:2em;color:#f00">GAME OVER</div><div>SCORE: ${score}</div><div style="font-size:0.8em;margin-top:8px">Refresh to restart</div>`;
      }
    }
  }

  // ── Update explosions ──
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.life -= dt * 1.5;
    ex.particles.forEach(p => {
      p.position.addScaledVector(p.userData.vel, dt);
      p.userData.vel.y -= 4 * dt;
      p.scale.setScalar(ex.life);
      p.material.opacity = ex.life;
      p.material.transparent = true;
    });
    if (ex.life <= 0) {
      ex.particles.forEach(p => scene.remove(p));
      explosions.splice(i, 1);
    }
  }

  // ── Drift clouds ──
  clouds.forEach(c => { c.position.x += 2 * dt; if (c.position.x > 300) c.position.x = -300; });

  // ── Spawn next wave ──
  if (enemies.length === 0) {
    wave++;
    ammo = Math.min(ammo + 10, 30);
    spawnWave(3 + wave);
    updateHUD();
  }

  // ── Camera: chase behind player ──
  const camOffset = new THREE.Vector3(0, 4, 18).applyEuler(new THREE.Euler(jetRot.x * 0.3, jetRot.y, 0, 'YXZ'));
  camera.position.lerp(playerJet.position.clone().add(camOffset), 0.1);
  const lookTarget = playerJet.position.clone().add(
    new THREE.Vector3(0, 0, -30).applyEuler(jetRot)
  );
  camera.lookAt(lookTarget);

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

updateHUD();
animate();
</script>
</body>
</html>
